<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>slctr — share what you're playing</title>
  <meta name="description" content="Share the music you're listening to with friends." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 1rem; }
    .tagline { font-size: 1.1rem; color: #888; margin-bottom: 2.5rem; }
    .app-store-btn {
      display: inline-block;
      background: #fff;
      color: #000;
      padding: 0.75rem 1.75rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .app-store-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="logo">slctr</div>
  <p class="tagline">share what you're playing</p>
  <a class="app-store-btn" href="https://apps.apple.com/app/slctr/id0000000000">
    Download on the App Store
  </a>
</body>
</html>
